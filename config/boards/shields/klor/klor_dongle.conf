# Keep the split central as lightweight as possible while debugging
# unstable peripheral connections.

# Disable central-side battery polling/proxy until the link is stable.
# (Re-enable later if desired.)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=n

# Dongle is USB-powered; boost TX here without increasing
# current draw on the halves.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
